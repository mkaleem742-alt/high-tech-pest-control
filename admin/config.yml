backend:
  name: github
  repo: mkaleem742-alt/high-tech-pest-control
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'en'

site_url: https://hightechpestcontrol.co.in
display_url: https://hightechpestcontrol.co.in

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sort:
      - field: date
        direction: descending
    fields:
      - { label: "Post Title (Heading)", name: "title", widget: "string", hint: "Keyword ke saath likhein" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Pest Control Tips"
          - "Termite Guide"
          - "Seasonal Tips"
          - "Cockroach Control"
          - "Bed Bug Guide"
          - "Comparison"
          - "Home Care"
        default: "Pest Control Tips"
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "DD-MM-YYYY", time_format: false }
      - { label: "Header Image", name: "thumbnail", widget: "image", required: false }
      - { label: "SEO Description", name: "description", widget: "text", required: false }
      - { label: "SEO Keywords", name: "keywords", widget: "string", required: false }
      - { label: "Read Time (minutes)", name: "readtime", widget: "number", default: 4, required: false }
      - { label: "Post Content", name: "body", widget: "markdown" }
